<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Twitter Unfollowers (Offline Tool)</title>
  <style>
    :root {
      --stats-height: 0px;
    }

    body {
      font-family: system-ui, sans-serif;
      background: #67B26F;
      background: -webkit-linear-gradient(left, #4ca2cd, #67B26F);
      background: linear-gradient(90deg, #4ca2cd, #67B26F);
      min-height: 100vh;
      padding: 2em;
      margin: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: #d8e5ee;
      border: 1px solid rgba(151,174,191,0.95);
      border-radius: 16px;
      padding: 2em;
      box-shadow: 0 26px 80px rgba(15,23,42,0.24);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-top: 0;
    }

    .archive-note {
      color: #475569;
      font-size: 0.9em;
      margin-top: -0.5em;
    }

    input, button {
      display: block;
      margin: 1em 0;
    }

    input[type="file"] {
      width: 100%;
      max-width: 460px;
      padding: 0.7em;
      border: 1px solid #9eb5c6;
      border-radius: 10px;
      background: #e1edf5;
      color: #1f2937;
    }

    button {
      padding: 0.65em 1.1em;
      background: #1d9bf0;
      color: white;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 650;
      letter-spacing: 0;
      box-shadow: 0 10px 22px rgba(29,155,240,0.24);
      transition: background 0.15s ease, transform 0.15s ease, box-shadow 0.15s ease;
    }

    button:hover { 
      background: #0c8de4;
      transform: translateY(-1px);
      box-shadow: 0 14px 28px rgba(29,155,240,0.30);
    }

    button:disabled { 
      background: #cbd5e1;
      color: #64748b;
      cursor: not-allowed; 
      box-shadow: none;
      transform: none;
    }

    .result {
      margin-top: 2em;
      padding: 0;
      background: #d3dfea;
      border: 1px solid #9eb5c6;
      border-radius: 14px;
      box-shadow: 0 18px 40px rgba(15,23,42,0.14);
    }

    .result > p {
      margin: 0;
      padding: 1.2em;
    }

    .stats {
      background: rgba(203,218,229,0.98);
      padding: 1.2em 1.4em;
      border-bottom: 1px solid #9eb5c6;
      border-radius: 14px 14px 0 0;
      margin-bottom: 1.5em;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 12px 28px rgba(15,23,42,0.16);
      backdrop-filter: blur(10px);
    }

    .stats-heading {
      background: linear-gradient(90deg, rgba(255,255,255,0.24), rgba(255,255,255,0.10));
      border: 1px solid rgba(255,255,255,0.28);
      border-radius: 10px;
      margin-bottom: 0.9em;
      padding: 0.75em 0.9em;
    }

    .stats-title {
      color: #1f2937;
      font-size: 1.3em;
      margin: 0;
    }

    .stats-body {
      display: grid;
      gap: 0.55em;
    }

    .stats-line {
      font-size: 1em;
    }

    .stats-subtle {
      color: #475569;
      font-size: 0.9em;
    }

    .stats-count {
      color: #0969b3;
    }

    .table-wrap {
      background: #d3dfea;
      overflow-x: visible;
      padding: 0 1.2em 1.2em;
    }

    table {
      width: 100%;
      min-width: 620px;
      border-collapse: collapse;
      margin-top: 0;
      font-size: 0.95rem;
    }

    thead {
      background: #5f7d99;
    }

    th {
      position: sticky;
      top: var(--stats-height);
      z-index: 80;
      padding: 0.85em 1em;
      text-align: left;
      font-size: 0.78rem;
      font-weight: 750;
      text-transform: uppercase;
      color: #ffffff;
      letter-spacing: 0;
      background: #5f7d99;
      border: 0;
    }

    th:first-child {
      border-radius: 10px 0 0 10px;
    }

    th:last-child {
      border-radius: 0 10px 10px 0;
    }

    td {
      padding: 0.45em 1em;
      border: 0;
      border-bottom: 1px solid #9eb5c6;
      color: #1f2937;
    }

    tr:nth-child(even) {
      background: #d5e2ec;
    }

    tr:nth-child(odd) {
      background: #dce7f0;
    }

    tbody tr:hover {
      background: #b4d1ea;
    }

    tbody td {
      color: #1f2937;
    }

    tbody tr:last-child td {
      border-bottom: 0;
    }

    .index-col {
      width: 60px;
      text-align: center;
      font-weight: 500;
    }

    tbody .index-col {
      color: #64748b;
    }

    .action-col {
      width: 140px;
      text-align: center;
    }

    .copy-btn {
      display: inline-block;
      margin: 0;
      padding: 0.34em 0.7em;
      background: #d6e2ec;
      color: #111827;
      border: 1px solid #8fa7bb;
      box-shadow: none;
      font-size: 0.86rem;
    }

    .copy-btn:hover {
      background: #c7d8e6;
      color: #0f172a;
      border-color: #728ea5;
      box-shadow: none;
      transform: none;
    }

    .copy-btn.copied {
      background: #ecfdf5;
      color: #047857;
      border-color: #a7f3d0;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1em;
      padding: 0 1.2em 1em;
      color: #475569;
      font-size: 0.92rem;
    }

    .pagination-controls {
      display: flex;
      gap: 0.5em;
      margin-left: auto;
    }

    .pagination button {
      margin: 0;
      padding: 0.5em 0.9em;
      box-shadow: none;
      font-size: 0.86rem;
    }

    .error {
      color: #d32f2f;
      background: #ffebee;
      margin: 1.2em;
      padding: 1em;
      border-radius: 6px;
    }

    @media (max-width: 720px) {
      body {
        padding: 1em;
      }

      .container {
        padding: 1.2em;
      }

      .table-wrap {
        overflow-x: auto;
      }

      .pagination {
        align-items: flex-start;
        flex-direction: column;
      }

      .pagination-controls {
        margin-left: 0;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🐦 Twitter X Unfollowers (Offline)</h1>
    <p>Select your Twitter archive files below:</p>
    <p class="archive-note">
      <em>Note: Twitter/X archives only include User IDs, not handles. Click links to see profiles.</em>
    </p>

    <label>Follower file (follower.js):</label>
    <input type="file" id="followersFile" accept=".js" />

    <label>Following file (following.js):</label>
    <input type="file" id="followingFile" accept=".js" />

    <button id="analyzeBtn">Analyze</button>

    <div class="result" id="result"></div>
  </div>

  <script>
    const PAGE_SIZE = 250;
    let currentPage = 1;
    let currentResults = [];
    let currentStats = null;

    function copyUrl(url, button) {
      navigator.clipboard.writeText(url).then(() => {
        const originalText = button.textContent;
        button.textContent = 'Copied!';
        button.classList.add('copied');
        setTimeout(() => {
          button.textContent = originalText;
          button.classList.remove('copied');
        }, 2000);
      }).catch(err => {
        alert('Failed to copy: ' + err);
      });
    }

    async function loadFile(fileInput) {
      return new Promise((resolve, reject) => {
        const file = fileInput.files[0];
        if (!file) return reject("No file selected");
        const reader = new FileReader();
        reader.onload = () => {
          try {
            const text = reader.result;
            // Twitter archive format: window.YTD.follower.part0 = [...]
            const jsonText = text.substring(text.indexOf("=") + 1).trim();
            const data = JSON.parse(jsonText);
            resolve(data);
          } catch (err) {
            reject("Invalid file format. Make sure it's a valid Twitter archive .js file.");
          }
        };
        reader.onerror = () => reject("Error reading file");
        reader.readAsText(file);
      });
    }

    function changePage(page) {
      const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
      currentPage = Math.min(Math.max(page, 1), totalPages);
      renderResults();
      document.getElementById("result").scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function updateStickyHeaderOffset() {
      const stats = document.querySelector(".stats");
      const statsHeight = stats ? stats.offsetHeight : 0;
      document.documentElement.style.setProperty("--stats-height", `${statsHeight}px`);
    }

    function renderResults() {
      const resultDiv = document.getElementById("result");
      const { followers, following, mutuals } = currentStats;
      const totalPages = Math.ceil(currentResults.length / PAGE_SIZE);
      const start = (currentPage - 1) * PAGE_SIZE;
      const end = Math.min(start + PAGE_SIZE, currentResults.length);
      const pageItems = currentResults.slice(start, end);

      let html = `
        <div class="stats">
          <div class="stats-heading">
            <h2 class="stats-title">🐦 Twitter X Unfollowers (Offline)</h2>
          </div>
          <div class="stats-body">
            <div class="stats-line">
              <strong>📊 Your Stats:</strong><br>
              Following: ${following} • Followers: ${followers} • Mutual: ${mutuals}
            </div>
            <div class="stats-line">
              <strong>❌ Not Following Back <span class="stats-count">(${currentResults.length})</span></strong>
            </div>
            <div class="stats-subtle">
              Showing User IDs (Twitter/X no longer provides handles in archives)
            </div>
          </div>
        </div>
      `;

      if (currentResults.length === 0) {
        resultDiv.innerHTML = html + `<p>Everyone you follow follows you back! 🎉</p>`;
        return;
      }

      html += `
        <div class="pagination">
          <div>Showing ${start + 1}-${end} of ${currentResults.length} • Page ${currentPage} of ${totalPages}</div>
          <div class="pagination-controls">
            <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>Previous</button>
            <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th class="index-col">#</th>
                <th>User ID</th>
                <th class="action-col">Action</th>
              </tr>
            </thead>
            <tbody>
      `;

      pageItems.forEach((f, index) => {
        const acc = f.following;
        const url = acc.screenName ? `https://x.com/${acc.screenName}` : `https://x.com/i/user/${acc.accountId}`;
        const displayName = acc.screenName ? `@${acc.screenName}` : acc.accountId;

        html += `
            <tr>
              <td class="index-col">${start + index + 1}</td>
              <td><a href="${url}" target="_blank">${displayName}</a></td>
              <td class="action-col">
                <button class="copy-btn" onclick="copyUrl('${url}', this)">Copy URL</button>
              </td>
            </tr>
        `;
      });

      html += `
            </tbody>
          </table>
        </div>
        <div class="pagination">
          <div>Showing ${start + 1}-${end} of ${currentResults.length} • Page ${currentPage} of ${totalPages}</div>
          <div class="pagination-controls">
            <button onclick="changePage(${currentPage - 1})" ${currentPage === 1 ? "disabled" : ""}>Previous</button>
            <button onclick="changePage(${currentPage + 1})" ${currentPage === totalPages ? "disabled" : ""}>Next</button>
          </div>
        </div>
      `;

      resultDiv.innerHTML = html;
      updateStickyHeaderOffset();
    }

    window.addEventListener("resize", updateStickyHeaderOffset);

    document.getElementById("analyzeBtn").onclick = async () => {
      const followersInput = document.getElementById("followersFile");
      const followingInput = document.getElementById("followingFile");
      const resultDiv = document.getElementById("result");
      const analyzeBtn = document.getElementById("analyzeBtn");

      // Reset state
      resultDiv.innerHTML = "<p>Processing...</p>";
      analyzeBtn.disabled = true;
      analyzeBtn.textContent = "Processing...";

      try {
        const followers = await loadFile(followersInput);
        const following = await loadFile(followingInput);

        // Extract account IDs
        const followerIds = new Set(followers.map(f => f.follower.accountId));

        // Find differences
        const notFollowingBack = following.filter(
          f => !followerIds.has(f.following.accountId)
        );

        // Sort alphabetically by screen name
        notFollowingBack.sort((a, b) => {
          const nameA = a.following.screenName || a.following.accountId;
          const nameB = b.following.screenName || b.following.accountId;
          return nameA.localeCompare(nameB);
        });

        currentPage = 1;
        currentResults = notFollowingBack;
        currentStats = {
          followers: followers.length,
          following: following.length,
          mutuals: following.length - notFollowingBack.length
        };
        renderResults();

      } catch (err) {
        resultDiv.innerHTML = `<div class="error"><strong>Error:</strong> ${err}</div>`;
      } finally {
        analyzeBtn.disabled = false;
        analyzeBtn.textContent = "Analyze";
      }
    };
  </script>
</body>
</html>
